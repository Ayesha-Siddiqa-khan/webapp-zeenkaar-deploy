apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeenkaar-app
  labels:
    app: zeenkaar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zeenkaar
  template:
    metadata:
      labels:
        app: zeenkaar
    spec:
      containers:
      - name: zeenkaar
        image: YOUR_ECR_REPOSITORY_URL:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5