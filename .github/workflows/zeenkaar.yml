name: Zeenkaar

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug workspace files
        run: |
          pwd
          ls -la

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Upload manifests to master
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "k8s"
          target: "/tmp"

      - name: Deploy from master
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ env.IMAGE_URI }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_URI
          script: |
            ls -la /tmp/k8s
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl apply -f /tmp/k8s/deployment.yaml
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl apply -f /tmp/k8s/service.yaml
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl set image deployment/zeenkaar-app zeenkaar=$IMAGE_URI
            sudo KUBECONFIG=/etc/kubernetes/admin.conf kubectl rollout status deployment/zeenkaar-app
          
